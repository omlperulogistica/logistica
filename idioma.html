<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OML PERU - Selector de idioma</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      min-height:100dvh;
      overflow:hidden;
      position:relative;
      color:#fff;
      background:#000;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:url("https://www.freshplaza.es/remote/https/agfstorage.blob.core.windows.net/misc/AGF_nl/2025/12/08/greenfruit2.jpg?preset=ContentFullSmall");
      background-size:cover;
      background-position:center center;
      background-repeat:no-repeat;
      filter:brightness(.38) contrast(1.08) saturate(1.04);
      transform:scale(1.02);
      z-index:0;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:linear-gradient(rgba(0,0,0,.18), rgba(0,0,0,.34));
      z-index:1;
      pointer-events:none;
    }

    .page{
      position:relative;
      width:100%;
      height:100vh;
      height:100dvh;
      z-index:2;
    }

    .logo{
      position:absolute;
      top:36px;
      left:50%;
      transform:translateX(-50%);
      font-size:48px;
      font-weight:400;
      color:#fff;
      letter-spacing:1px;
      text-shadow:0 2px 10px rgba(0,0,0,.30);
      user-select:none;
      z-index:4;
      white-space:nowrap;
    }

    .panel{
      position:absolute;
      top:33%;
      left:50%;
      transform:translateX(-50%);
      width:370px;
      max-width:calc(100vw - 32px);
      z-index:5;
    }

    .title{
      text-align:center;
      font-size:14px;
      font-weight:700;
      color:#fff;
      margin-bottom:12px;
      text-shadow:0 2px 10px rgba(0,0,0,.30);
    }

    .search-shell{
      position:relative;
      width:100%;
      margin-bottom:14px;
    }

    .search-box{
      width:100%;
      min-height:74px;
      background:#fff;
      display:flex;
      align-items:stretch;
      box-shadow:0 4px 16px rgba(0,0,0,.12);
    }

    .search-input{
      flex:1;
      border:none;
      outline:none;
      background:#fff;
      color:#111;
      font-size:14px;
      padding:24px 12px;
    }

    .search-input::placeholder{
      color:#7b7b7b;
    }

    .search-action{
      width:56px;
      min-width:56px;
      border:none;
      border-left:1px solid #ececec;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:background .2s ease;
    }

    .search-action:hover{
      background:#f5f5f5;
    }

    .search-action svg{
      width:20px;
      height:20px;
      stroke:#666;
      stroke-width:1.8;
      fill:none;
      transition:transform .2s ease;
    }

    .search-shell.open .search-action .chevron{
      transform:rotate(180deg);
    }

    .dropdown{
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      width:100%;
      max-height:280px;
      overflow:auto;
      background:rgba(255,255,255,.99);
      box-shadow:0 12px 28px rgba(0,0,0,.22);
      border:1px solid rgba(0,0,0,.08);
      display:none;
      z-index:10;
    }

    .search-shell.open .dropdown{
      display:block;
    }

    .dropdown-item{
      width:100%;
      border:none;
      background:#fff;
      color:#111;
      text-align:left;
      padding:14px 12px;
      font-size:14px;
      cursor:pointer;
      border-bottom:1px solid #efefef;
      transition:background .15s ease;
    }

    .dropdown-item:hover,
    .dropdown-item.active{
      background:#f3f5f7;
    }

    .dropdown-empty{
      padding:14px 12px;
      font-size:14px;
      color:#666;
      background:#fff;
    }

    .helper{
      margin:0 0 14px;
      min-height:18px;
      text-align:left;
      font-size:12px;
      color:#fff;
      text-shadow:0 2px 10px rgba(0,0,0,.35);
    }

    .remember{
      width:100%;
      min-height:62px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:20px 12px;
      margin-bottom:16px;
      box-shadow:0 4px 16px rgba(0,0,0,.12);
    }

    .remember label{
      color:#111;
      font-size:14px;
      cursor:pointer;
      user-select:none;
    }

    .remember input[type="checkbox"]{
      width:18px;
      height:18px;
      accent-color:#555;
      cursor:pointer;
      flex-shrink:0;
    }

    .btn-wrap{
      text-align:center;
    }

    .btn-go{
      width:180px;
      height:46px;
      border:none;
      background:#4a4a4a;
      color:#fff;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:background .2s ease, transform .12s ease;
      box-shadow:0 4px 14px rgba(0,0,0,.18);
    }

    .btn-go:hover{
      background:#383838;
    }

    .btn-go:active{
      transform:scale(.98);
    }

    .status{
      margin-top:12px;
      min-height:18px;
      text-align:center;
      font-size:12px;
      color:#fff;
      text-shadow:0 2px 10px rgba(0,0,0,.35);
    }

    @media (max-width: 480px){
      .logo{
        top:42px;
        font-size:40px;
      }

      .panel{
        top:30%;
        width:370px;
        max-width:calc(100vw - 26px);
      }

      .search-box{
        min-height:68px;
      }

      .search-input{
        padding:21px 12px;
      }

      .remember{
        min-height:58px;
        padding:18px 12px;
      }

      .btn-go{
        width:170px;
        height:44px;
        font-size:14px;
      }
    }

    @media (max-width: 360px){
      .logo{
        font-size:34px;
      }

      .panel{
        top:29%;
        max-width:calc(100vw - 20px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">OML PERU</div>

    <div class="panel">

        <div class="dropdown" id="dropdown"></div>

      <div class="helper" id="helperText"></div>

      <div class="remember">

        <input type="checkbox" id="rememberChoice" />

      <div class="btn-wrap">
        <button class="btn-go" id="goBtn">Go</button>

      <div class="status" id="status"></div>

      { code: "zh-TW", label: "Taiwan (繁體中文)", search: "taiwan chinese chino tradicional" }

    const searchShell = document.getElementById("searchShell");
    const input = document.getElementById("languageInput");
    const toggleBtn = document.getElementById("toggleSearch");
    const dropdown = document.getElementById("dropdown");
    const helperText = document.getElementById("helperText");
    const rememberChoice = document.getElementById("rememberChoice");
    const goBtn = document.getElementById("goBtn");
    const status = document.getElementById("status");

    let selectedLocale = null;
    let filteredLocales = [...locales];

    function normalizeText(text) {
      return (text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function openDropdown() {
      searchShell.classList.add("open");
    }

    function closeDropdown() {
      searchShell.classList.remove("open");
    }

    function renderDropdown(list) {
      dropdown.innerHTML = "";

      if (!list.length) {
        const empty = document.createElement("div");
        empty.className = "dropdown-empty";
        empty.textContent = "No se encontraron resultados.";
        dropdown.appendChild(empty);
        return;
      }

      list.forEach(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "dropdown-item" + (selectedLocale && selectedLocale.code === item.code ? " active" : "");
        button.textContent = item.label;

        button.addEventListener("mousedown", function(e){
          e.preventDefault();
          setSelected(item, "manual");
        });

        dropdown.appendChild(button);
      });
    }

    function setSelected(item, source = "manual") {
      selectedLocale = item;
      input.value = item.label;
      closeDropdown();

      if (source === "auto") {
        helperText.textContent = "Detectado automáticamente: " + item.label;
      } else if (source === "remembered") {
        helperText.textContent = "Selección guardada recuperada: " + item.label;
      } else {
        helperText.textContent = "Seleccionado: " + item.label;
      }

      renderDropdown(filteredLocales);
    }

    function filterLocales(term) {
      const q = normalizeText(term);

      if (!q) return [...locales];

      return locales.filter(item => {
        const haystack = normalizeText(item.label + " " + item.code + " " + item.search);
        return haystack.includes(q);
      });
    }

    function detectLocaleFast() {
      const prefs = Array.from(
        new Set(
          [...(navigator.languages || []), navigator.language]
            .filter(Boolean)
            .map(v => v.trim())
        )
      );

      for (const pref of prefs) {
        const exact = locales.find(item => item.code.toLowerCase() === pref.toLowerCase());
        if (exact) return exact;
      }

      for (const pref of prefs) {
        const lang = pref.toLowerCase().split("-")[0];
        const partial = locales.find(item => item.code.toLowerCase().split("-")[0] === lang);
        if (partial) return partial;
      }

      return null;
    }

    function clearSavedLocale() {
      localStorage.removeItem("oml_remember");
      localStorage.removeItem("oml_locale_code");
      localStorage.removeItem("oml_locale_label");
      sessionStorage.removeItem("oml_temp_locale_code");
      sessionStorage.removeItem("oml_temp_locale_label");
    }

    function saveLocale(item, remember) {
      if (remember) {
        localStorage.setItem("oml_remember", "true");
        localStorage.setItem("oml_locale_code", item.code);
        localStorage.setItem("oml_locale_label", item.label);

        sessionStorage.removeItem("oml_temp_locale_code");
        sessionStorage.removeItem("oml_temp_locale_label");
      } else {
        localStorage.removeItem("oml_remember");
        localStorage.removeItem("oml_locale_code");
        localStorage.removeItem("oml_locale_label");

        sessionStorage.setItem("oml_temp_locale_code", item.code);
        sessionStorage.setItem("oml_temp_locale_label", item.label);
      }
    }

    function restoreSavedOrDetect() {
      const remembered = localStorage.getItem("oml_remember");
      const savedCode = localStorage.getItem("oml_locale_code");
      const tempCode = sessionStorage.getItem("oml_temp_locale_code");

      if (remembered === "true" && savedCode) {
        const savedItem = locales.find(item => item.code === savedCode);
        if (savedItem) {
          rememberChoice.checked = true;
          setSelected(savedItem, "remembered");
          return;
        }
      }

      if (tempCode) {
        const tempItem = locales.find(item => item.code === tempCode);
        if (tempItem) {
          rememberChoice.checked = false;
          setSelected(tempItem, "manual");
          helperText.textContent = "Usando selección temporal: " + tempItem.label;
          return;
        }
      }

      const auto = detectLocaleFast();
      if (auto) {
        setSelected(auto, "auto");
      } else {
        helperText.textContent = "No se pudo detectar con precisión. Escribe país o idioma.";
      }
    }

    input.addEventListener("focus", () => {
      filteredLocales = filterLocales(input.value);
      renderDropdown(filteredLocales);
      openDropdown();
    });

    input.addEventListener("input", () => {
      selectedLocale = null;
      filteredLocales = filterLocales(input.value);
      renderDropdown(filteredLocales);
      openDropdown();
      helperText.textContent = "Busca por país, idioma o código. Ejemplo: Perú, Español, es-PE.";
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        filteredLocales = filterLocales(input.value);
        renderDropdown(filteredLocales);
        openDropdown();

        if (filteredLocales.length === 1) {
          setSelected(filteredLocales[0], "manual");
        }
      }
    });

    toggleBtn.addEventListener("click", () => {
      filteredLocales = filterLocales(input.value);
      renderDropdown(filteredLocales);

      if (searchShell.classList.contains("open")) {
        closeDropdown();
      } else {
        openDropdown();
      }
    });

    document.addEventListener("click", (e) => {
      if (!searchShell.contains(e.target)) {
        closeDropdown();
      }
    });

    goBtn.addEventListener("click", () => {
      let current = selectedLocale;

      if (!current) {
        const exactMatch = locales.find(item =>
          normalizeText(item.label) === normalizeText(input.value) ||
          normalizeText(item.code) === normalizeText(input.value)
        );

        if (exactMatch) {
          current = exactMatch;
          setSelected(current, "manual");
        }
      }

      if (!current) {
        status.textContent = "Primero selecciona un idioma válido.";
        return;
      }

      saveLocale(current, rememberChoice.checked);
      status.textContent = "Idioma listo: " + current.label;

      window.location.href = "index.html";
    });

    restoreSavedOrDetect();
    renderDropdown(locales);
  </script>
</body>
</html>
